{% extends 'diary/base.html' %}
{% block title %}Удалить путешествие{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body text-center p-5">
                <i class="bi bi-trash3" style="font-size:3rem; color:var(--accent-coral)"></i>
                <h4 class="mt-3">Удалить «{{ trip.title }}»?</h4>
                <p class="text-muted">Это действие нельзя отменить.</p>
                <form method="post" class="d-flex gap-2 justify-content-center mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger"><i class="bi bi-trash3 me-1"></i>Да, удалить</button>
                    <a href="{% url 'trip_detail' trip.pk %}" class="btn btn-outline-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
